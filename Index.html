<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestiario de criaturas magicas</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script defer src="./js/script.js"></script>
</head>

<body>
    <header>
        <h1>El Bestiario Interactivo</h1>
        <p>Explora y registra las magicas criaturas que encuentres en tu aventura.</p>

        <nav class="pag-principal">
            <a href="./pages/album.html" id="link-album">Ver mi Álbum de Colección</a>
        </nav>
    </header>

    <main>
        <section class="seccion-buscador">
            <label for="buscador-criaturas">Busca una criatura:</label>
            <input type="text" id="buscador-criaturas" placeholder="Empieza a escribir...">
        </section>
        <section class="seccion-catalogo">
            <h2>Criaturas por descubrir</h2>
            <div id="contenedor-criaturas" class="grilla-criaturas">
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
